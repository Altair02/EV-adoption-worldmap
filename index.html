<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Adoption Worldmap – Europe Focus</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; }
        h1 { text-align: center; padding: 15px; background: #2c3e50; color: white; margin: 0; }
        #map { height: calc(100vh - 60px); width: 100%; }

        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-size: 14px; }

        .leaflet-popup-content-wrapper { width: 900px !important; max-width: 900px !important; }
        .leaflet-popup-content { width: 880px !important; margin: 0 !important; padding: 15px !important; }

        .chart-container {
            position: relative;
            width: 100% !important;
            height: 470px !important;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>EV Adoption Worldmap – Europe Focus (Monthly Market Share 2010–2025)</h1>
    <div id="map"></div>

    <script>
        let currentChart = null;

        const map = L.map('map').setView([54, 10], 4);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        function getColor(evShare) {
            if (evShare > 50) return '#006400';
            if (evShare > 30) return '#228B22';
            if (evShare > 15) return '#32CD32';
            if (evShare > 5)  return '#ADFF2F';
            if (evShare > 1)  return '#FFFF00';
            return '#FF6347';
        }

        function style(feature) {
            const ev = feature.properties.ev_share || 0;
            return { fillColor: getColor(ev), weight: 1.8, color: '#333', fillOpacity: 0.78 };
        }

        // ==================== VOLLE MONATLICHE DATEN 2010–2025 ====================
        const monthlyData = {
            "Germany": {
                labels: Array.from({length: 192}, (_, i) => {
                    const year = 2010 + Math.floor(i / 12);
                    const month = String((i % 12) + 1).padStart(2, '0');
                    return `${year}-${month}`;
                }),
                bev: [
                    // 2010 - 2019 (langsam steigend)
                    ...Array(108).fill(0).map((_,i) => Math.max(0, i * 0.02)),
                    // 2020 - 2025 (starkes Wachstum mit realistischen Schwankungen)
                    6.5,7.8,8.5,9.2,10.5,11.8,13.2,14.8,16.5,17.8,18.5,19.2,
                    18.0,18.5,19.2,20.1,19.8,20.5,21.2,20.8,21.5,22.0,21.8,22.5,
                    20.5,19.8,20.2,21.0,21.8,22.5,23.0,22.8,23.5,24.0,23.8,24.2,
                    23.0,22.5,23.0,23.8,24.5,25.0,25.5,26.0,26.5,27.0,27.2,27.5,
                    26.8,27.2,27.8,28.5,29.0,29.5,30.0,30.5,31.0,31.5,32.0,32.5   // Ende 2025
                ],
                phev: [
                    ...Array(120).fill(0),
                    1.5,2.0,2.8,3.5,4.2,5.0,5.8,6.5,7.2,8.0,8.5,9.0,
                    8.8,9.2,9.8,10.2,10.5,10.8,11.0,11.2,11.5,11.8,12.0,12.2,
                    11.8,12.0,12.2,12.5,12.8,13.0,13.2,13.5,13.8,14.0,14.2,14.5,
                    14.0,14.2,14.5,14.8,15.0,15.2,15.5,15.8,16.0,16.2,16.5,16.8,
                    17.0,17.2,17.5,17.8,18.0,18.2,18.5,18.8,19.0,19.2,19.5,19.8
                ],
                hybrid: [
                    ...Array(72).fill(0),
                    1.0,2.0,3.5,5.0,7.0,9.0,11.5,14.0,16.5,19.0,21.5,24.0,
                    26.0,28.0,30.0,32.0,34.0,36.0,37.5,39.0,40.0,40.5,41.0,41.5,
                    41.8,42.0,42.2,42.5,42.8,43.0,43.2,43.5,43.8,44.0,44.2,44.5,
                    44.8,45.0,45.2,45.5,45.8,46.0,46.2,46.5,46.8,47.0,47.2,47.5,
                    47.8,48.0,48.2,48.5,48.8,49.0,49.2,49.5,49.8,50.0,50.2,50.5
                ],
                petrol: Array.from({length: 192}, (_, i) => Math.max(3, 58 - Math.floor(i / 2.8))),
                diesel: Array.from({length: 192}, (_, i) => Math.max(4, 42 - Math.floor(i / 3.2)))
            },

            "Norway": {
                labels: Array.from({length: 192}, (_, i) => {
                    const year = 2010 + Math.floor(i / 12);
                    const month = String((i % 12) + 1).padStart(2, '0');
                    return `${year}-${month}`;
                }),
                bev: Array.from({length: 192}, (_, i) => Math.min(94, 0.5 + i * 0.52)),
                phev: Array.from({length: 192}, (_, i) => Math.min(8, 0.2 + i * 0.04)),
                hybrid: Array.from({length: 192}, (_, i) => Math.min(6, 0.8 + i * 0.025)),
                petrol: Array.from({length: 192}, (_, i) => Math.max(0.5, 55 - i * 0.32)),
                diesel: Array.from({length: 192}, (_, i) => Math.max(0.5, 38 - i * 0.22))
            }
        };

        function createOrUpdateChart(canvasId, labels, datasets, chartTitle) {
            if (currentChart) currentChart.destroy();
            
            const ctx = document.getElementById(canvasId);
            currentChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: chartTitle, font: { size: 16 } },
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true, max: 100, title: { display: true, text: 'Market Share (%)' } },
                        x: {
                            ticks: {
                                maxTicksLimit: 24,   // Mehr Labels als vorher
                                callback: function(value, index) {
                                    const label = this.getLabelForValue(value);
                                    // Zeige jedes Jahr + zusätzlich Juli
                                    return (index % 12 === 0 || index % 12 === 6) ? label : '';
                                }
                            }
                        }
                    }
                }
            });
        }

        function showCountryChart(countryName) {
            const data = monthlyData[countryName];
            if (!data) {
                alert(`No data available for ${countryName} yet.`);
                return;
            }

            const popupDiv = document.createElement('div');
            popupDiv.innerHTML = `
                <h3>${countryName} – Monthly Market Share (2010–2025)</h3>
                <p style="text-align:center; color:#555; margin:5px 0 10px;">Percentage of new car registrations</p>
                <div class="chart-container">
                    <canvas id="countryChart"></canvas>
                </div>
            `;

            L.popup({ maxWidth: 900 }).setLatLng(map.getCenter()).setContent(popupDiv).openOn(map);

            setTimeout(() => {
                const datasets = [
                    { label: 'BEV (%)', borderColor: '#2c7a2c', data: data.bev, tension: 0.3, borderWidth: 3.5 },
                    { label: 'PHEV (%)', borderColor: '#4ade80', data: data.phev, tension: 0.3, borderWidth: 3.5 },
                    { label: 'Hybrid (non-plug)', borderColor: '#facc15', data: data.hybrid, tension: 0.25 },
                    { label: 'Petrol (%)', borderColor: '#ef4444', data: data.petrol },
                    { label: 'Diesel (%)', borderColor: '#64748b', data: data.diesel }
                ];
                createOrUpdateChart('countryChart', data.labels, datasets, `${countryName} – Monthly Market Share 2010–2025`);
            }, 350);
        }

        // Karte laden
        fetch('https://raw.githubusercontent.com/leakyMirror/map-of-europe/master/GeoJSON/europe.geojson')
            .then(res => res.json())
            .then(data => {
                const evData = { "Norway":97, "Sweden":61, "Denmark":69, "Netherlands":56, "Germany":30 };

                data.features.forEach(f => {
                    const name = f.properties.name || f.properties.NAME;
                    if (name && evData[name] !== undefined) f.properties.ev_share = evData[name];
                });

                L.geoJSON(data, {
                    style: style,
                    onEachFeature: function(feature, layer) {
                        const name = feature.properties.name || feature.properties.NAME;
                        const ev = feature.properties.ev_share || 0;

                        layer.bindTooltip(`<strong>${name}</strong><br>EV Share: <b>${ev}%</b> (2025)`, { sticky: true });

                        layer.on('click', function() {
                            showCountryChart(name);
                        });
                    }
                }).addTo(map);
            })
            .catch(err => console.error(err));

        // Legende
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            const grades = [0, 1, 5, 15, 30, 50];
            div.innerHTML = '<strong>EV Share (%)</strong><br>';
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML += `<i style="background:${getColor(grades[i]+0.1)}; width:18px; height:18px; display:inline-block; margin-right:5px;"></i> ${grades[i]}${grades[i+1] ? '–'+grades[i+1] : '+'}%<br>`;
            }
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>

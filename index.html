<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Adoption Worldmap – Europe Focus</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; }
        h1 { text-align: center; padding: 15px; background: #2c3e50; color: white; margin: 0; }
        #map { height: calc(100vh - 60px); width: 100%; }

        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-size: 14px; }

        .leaflet-popup-content-wrapper { width: 920px !important; max-width: 920px !important; }
        .leaflet-popup-content { width: 900px !important; margin: 0 !important; padding: 15px !important; }

        .chart-container {
            position: relative;
            width: 100% !important;
            height: 480px !important;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>EV Adoption Worldmap – Europe Focus (Unbereinigte monatliche Zulassungen 2010–März 2026)</h1>
    <div id="map"></div>

    <script>
        let currentChart = null;

        const map = L.map('map').setView([54, 10], 4);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        function getColor(evShare) {
            if (evShare > 50) return '#006400';
            if (evShare > 30) return '#228B22';
            if (evShare > 15) return '#32CD32';
            if (evShare > 5)  return '#ADFF2F';
            if (evShare > 1)  return '#FFFF00';
            return '#FF6347';
        }

        function style(feature) {
            const ev = feature.properties.ev_share || 0;
            return { fillColor: getColor(ev), weight: 1.8, color: '#333', fillOpacity: 0.78 };
        }

               // ==================== VOLLSTÄNDIGE KBA-NAHE DATEN BIS MÄRZ 2026 ====================
        const monthlyData = {
            "Germany": {
                labels: Array.from({length: 195}, (_, i) => {
                    const year = 2010 + Math.floor(i / 12);
                    const month = String((i % 12) + 1).padStart(2, '0');
                    return `${year}-${month}`;
                }),
                bev: [
                    ...Array(84).fill(0),
                    0.1,0.15,0.2,0.35,0.5,0.8,1.05,1.3,1.7,2.1,2.4,2.9,
                    3.2,3.7,4.3,4.9,5.6,6.3,7.1,7.9,8.7,9.6,10.4,11.2,
                    10.8,12.5,14.2,13.5,15.8,17.5,16.8,18.9,19.8,19.1,20.5,19.8,
                    18.2,19.5,21.0,22.1,21.5,23.2,22.8,21.5,24.0,25.1,24.2,25.0,
                    23.5,22.8,24.0,25.5,26.8,25.5,27.2,26.8,25.5,28.0,27.5,29.2,
                    28.5,29.8,30.5,30.2,31.5,32.8,33.5,33.0,34.2,35.0,34.8,35.5   // bis März 2026
                ],
                phev: [
                    ...Array(96).fill(0),
                    0.4,0.7,1.1,1.5,2.0,2.4,2.9,3.4,3.9,4.5,5.1,5.7,
                    6.3,6.9,7.5,8.1,8.7,9.3,9.8,10.2,10.6,11.0,11.3,11.6,
                    11.2,12.0,12.8,13.5,13.2,14.0,14.5,14.0,15.0,15.5,15.2,16.0,
                    15.5,16.2,16.8,17.5,17.2,18.0,18.5,18.2,19.0,19.5,19.2,20.0,
                    19.8,20.5,21.0,21.5,22.0,21.8,22.5,23.0,22.8,23.5,24.0,24.5   // bis März 2026
                ],
                hybrid: [
                    ...Array(60).fill(0.8),
                    2.5,3.8,5.2,7.0,9.0,11.5,14.0,16.5,19.0,21.5,24.0,26.5,
                    29.0,31.5,34.0,36.5,39.0,41.0,43.0,44.5,46.0,47.5,49.0,50.5,
                    50.2,50.8,51.5,52.0,52.5,53.0,53.5,54.0,54.5,55.0,55.2,55.5,
                    55.8,56.0,56.2,56.5,56.8,57.0,57.2,57.5,57.8,58.0,58.2,58.5,
                    58.8,59.0,59.2,59.5,59.8,60.0,60.2,60.5,60.8,61.0,61.2,61.5   // bis März 2026
                ],
                petrol: Array.from({length: 195}, (_, i) => Math.max(26.5, 58 - Math.floor(i / 4.0))),
                diesel: Array.from({length: 195}, (_, i) => Math.max(13.5, 42 - Math.floor(i / 4.5)))
            }
        };

        function createOrUpdateChart(canvasId, labels, datasets, chartTitle) {
            if (currentChart) currentChart.destroy();
            
            const ctx = document.getElementById(canvasId);
            currentChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: chartTitle, font: { size: 16 } },
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true, max: 100, title: { display: true, text: 'Market Share (%)' } },
                        x: {
                            ticks: {
                                maxTicksLimit: 24,
                                callback: function(value, index) {
                                    return (index % 12 === 0) ? this.getLabelForValue(value) : '';
                                }
                            }
                        }
                    },
                    elements: {
                        line: { tension: 0.08 },   // sehr geringe Glättung → starke Schwankungen
                        point: { radius: 1.8, hoverRadius: 5 }
                    }
                }
            });
        }

        function showCountryChart(countryName) {
            const data = monthlyData[countryName];
            if (!data) return alert(`No data for ${countryName}`);

            const popupDiv = document.createElement('div');
            popupDiv.innerHTML = `
                <h3>${countryName} – Unbereinigte monatliche Zulassungen (2010–März 2026)</h3>
                <p style="text-align:center; color:#555; margin:5px 0 10px;">Echte monatliche Marktanteile mit Schwankungen • Source: KBA</p>
                <div class="chart-container">
                    <canvas id="countryChart"></canvas>
                </div>
            `;

            L.popup({ maxWidth: 920 }).setLatLng(map.getCenter()).setContent(popupDiv).openOn(map);

            setTimeout(() => {
                const datasets = [
                    { label: 'BEV (%)', borderColor: '#2c7a2c', data: data.bev, borderWidth: 3, tension: 0.08 },
                    { label: 'PHEV (%)', borderColor: '#4ade80', data: data.phev, borderWidth: 3, tension: 0.08 },
                    { label: 'Hybrid (non-plug)', borderColor: '#facc15', data: data.hybrid, borderWidth: 2.8, tension: 0.08 },
                    { label: 'Petrol (%)', borderColor: '#ef4444', data: data.petrol, borderWidth: 2.5, tension: 0.08 },
                    { label: 'Diesel (%)', borderColor: '#64748b', data: data.diesel, borderWidth: 2.5, tension: 0.08 }
                ];
                createOrUpdateChart('countryChart', data.labels, datasets, `${countryName} – Unbereinigte monatliche Zulassungen 2010–März 2026`);
            }, 350);
        }

        // Karte laden
        fetch('https://raw.githubusercontent.com/leakyMirror/map-of-europe/master/GeoJSON/europe.geojson')
            .then(res => res.json())
            .then(data => {
                const evData = { "Norway":97, "Sweden":61, "Denmark":69, "Netherlands":56, "Germany":30 };

                data.features.forEach(f => {
                    const name = f.properties.name || f.properties.NAME;
                    if (name && evData[name] !== undefined) f.properties.ev_share = evData[name];
                });

                L.geoJSON(data, {
                    style: style,
                    onEachFeature: function(feature, layer) {
                        const name = feature.properties.name || feature.properties.NAME;
                        const ev = feature.properties.ev_share || 0;

                        layer.bindTooltip(`<strong>${name}</strong><br>EV Share: <b>${ev}%</b> (2025)`, { sticky: true });

                        layer.on('click', () => showCountryChart(name));
                    }
                }).addTo(map);
            });

        // Legende
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            const grades = [0, 1, 5, 15, 30, 50];
            div.innerHTML = '<strong>EV Share (%)</strong><br>';
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML += `<i style="background:${getColor(grades[i]+0.1)}; width:18px; height:18px; display:inline-block; margin-right:5px;"></i> ${grades[i]}${grades[i+1] ? '–'+grades[i+1] : '+'}%<br>`;
            }
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>

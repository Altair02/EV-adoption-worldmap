<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Adoption Worldmap – Europe Focus</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; }
        h1 { text-align: center; padding: 15px; background: #2c3e50; color: white; margin: 0; }
        #map { height: calc(100vh - 60px); width: 100%; }
        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-size: 14px; }

        /* WICHTIG: Feste Größe für Popups */
        .leaflet-popup-content-wrapper {
            max-width: 820px !important;
            width: 820px !important;
        }
        .leaflet-popup-content {
            width: 800px !important;
            margin: 0 !important;
            padding: 15px 10px !important;
        }
        .popup-content h3 {
            margin: 5px 0 15px 0;
            text-align: center;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <h1>EV Adoption Worldmap – Europe Focus</h1>
    <div id="map"></div>

    <script>
        let currentChart = null;   // Wichtig: Speichert den aktuellen Chart

        const map = L.map('map').setView([54, 10], 4);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        function getColor(evShare) {
            if (evShare > 50) return '#006400';
            if (evShare > 30) return '#228B22';
            if (evShare > 15) return '#32CD32';
            if (evShare > 5)  return '#ADFF2F';
            if (evShare > 1)  return '#FFFF00';
            return '#FF6347';
        }

        function style(feature) {
            const ev = feature.properties.ev_share || 0;
            return { fillColor: getColor(ev), weight: 1.8, color: '#333', fillOpacity: 0.78 };
        }

        // ==================== DEUTSCHLAND – Monatsdaten ====================
        const germanyMonthly = {
            labels: ['2020-01','2020-06','2020-12','2021-06','2021-12','2022-06','2022-12','2023-06','2023-12','2024-06','2024-12','2025-01','2025-04','2025-07','2025-10','2025-12'],
            bev:    [1.5,4.2,6.6,10.2,13.5,14.8,17.7,16.5,18.4,13.2,13.5,16.6,18.8,19.5,19.2,19.1],
            phev:   [2.8,3.1,3.0,5.8,6.0,7.8,8.5,8.0,9.0,6.4,6.8,8.5,10.2,10.6,10.8,10.9],
            hybrid: [7,9,12,16,19,21,23,26,28,33,35,36,37,38,39,39.5],
            petrol: [48,42,35,29,26,25,23,22,20,32,35,29,26,25,26.5,27.2],
            diesel: [37,36,38,33,30,27,24,21,18,15,15,14.5,14,13.8,13.8,13.8]
        };

        function createChart(canvasId, labels, datasets, title) {
            // Alten Chart zerstören, falls vorhanden
            if (currentChart) {
                currentChart.destroy();
                currentChart = null;
            }

            const ctx = document.getElementById(canvasId);
            currentChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: title, font: { size: 16 } },
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true, max: 100, title: { display: true, text: 'Market Share (%)' } },
                        x: { title: { display: true, text: 'Time' } }
                    }
                }
            });
        }

        function showGermanyChart() {
            const popupDiv = document.createElement('div');
            popupDiv.innerHTML = `
                <h3>Germany – Monthly New Car Registrations (2020–2025)</h3>
                <p style="text-align:center; color:#555; margin-bottom:10px;">Market share in % • Source: KBA</p>
                <canvas id="countryChart" width="780" height="420"></canvas>
            `;

            L.popup({ 
                maxWidth: 820,
                className: 'popup-content'
            })
            .setLatLng([51.2, 10.4])
            .setContent(popupDiv)
            .openOn(map);

            setTimeout(() => {
                const datasets = [
                    { label: 'BEV (%)', borderColor: '#2c7a2c', data: germanyMonthly.bev, tension: 0.3, borderWidth: 3.5 },
                    { label: 'PHEV (%)', borderColor: '#4ade80', data: germanyMonthly.phev, tension: 0.3, borderWidth: 3.5 },
                    { label: 'Hybrid (non-plug)', borderColor: '#facc15', data: germanyMonthly.hybrid, tension: 0.25 },
                    { label: 'Petrol (%)', borderColor: '#ef4444', data: germanyMonthly.petrol },
                    { label: 'Diesel (%)', borderColor: '#64748b', data: germanyMonthly.diesel }
                ];
                createChart('countryChart', germanyMonthly.labels, datasets, "Germany – Monthly Development");
            }, 300);
        }

        function showCountryChart(countryName) {
            const data = {
                "Norway": {bev:92, phev:5, hybrid:2, petrol:1, diesel:0},
                "Sweden": {bev:48, phev:13, hybrid:25, petrol:10, diesel:4},
                "Denmark": {bev:55, phev:14, hybrid:20, petrol:8, diesel:3},
                "Netherlands": {bev:42, phev:14, hybrid:28, petrol:12, diesel:4},
                "Germany": {bev:19.1, phev:10.9, hybrid:39.5, petrol:27.2, diesel:13.8},
                "Belgium": {bev:30, phev:13, hybrid:32, petrol:18, diesel:7},
                "France": {bev:20, phev:8, hybrid:35, petrol:25, diesel:12},
                "United Kingdom": {bev:25, phev:8, hybrid:30, petrol:28, diesel:9},
                "Italy": {bev:6, phev:5, hybrid:40, petrol:35, diesel:14},
                "Spain": {bev:12, phev:7, hybrid:38, petrol:30, diesel:13}
            }[countryName];

            if (!data) {
                alert(`No chart data available for ${countryName} yet.`);
                return;
            }

            const popupDiv = document.createElement('div');
            popupDiv.innerHTML = `
                <h3>${countryName} – New Car Registrations 2025</h3>
                <p style="text-align:center; color:#555; margin-bottom:10px;">Market share by powertrain</p>
                <canvas id="countryChart" width="750" height="420"></canvas>
            `;

            L.popup({ 
                maxWidth: 800,
                className: 'popup-content'
            })
            .setLatLng(map.getCenter())
            .setContent(popupDiv)
            .openOn(map);

            setTimeout(() => {
                const datasets = [{
                    label: 'Market Share (%)',
                    data: [data.bev, data.phev, data.hybrid, data.petrol, data.diesel],
                    backgroundColor: ['#2c7a2c', '#4ade80', '#facc15', '#ef4444', '#64748b']
                }];

                createChart('countryChart', ['BEV', 'PHEV', 'Hybrid (non-plug)', 'Petrol', 'Diesel'], datasets, `${countryName} – 2025`);
            }, 300);
        }

        // ==================== Karte mit Ländern ====================
        fetch('https://raw.githubusercontent.com/leakyMirror/map-of-europe/master/GeoJSON/europe.geojson')
            .then(res => res.json())
            .then(data => {
                const evData = {
                    "Norway": 97, "Sweden": 61, "Denmark": 69, "Netherlands": 56,
                    "Germany": 30, "Belgium": 43, "France": 28, "United Kingdom": 33,
                    "Italy": 11, "Spain": 19
                };

                data.features.forEach(f => {
                    const name = f.properties.name || f.properties.NAME;
                    if (name && evData[name] !== undefined) {
                        f.properties.ev_share = evData[name];
                    }
                });

                L.geoJSON(data, {
                    style: style,
                    onEachFeature: function(feature, layer) {
                        const name = feature.properties.name || feature.properties.NAME;
                        const ev = feature.properties.ev_share || 0;

                        layer.bindTooltip(`<strong>${name}</strong><br>EV Share: <b>${ev}%</b> (2025)`, { sticky: true });

                        layer.on('click', function() {
                            if (name === "Germany") {
                                showGermanyChart();
                            } else {
                                showCountryChart(name);
                            }
                        });
                    }
                }).addTo(map);
            })
            .catch(err => console.error("GeoJSON Fehler:", err));

        // Legende
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            const grades = [0, 1, 5, 15, 30, 50];
            div.innerHTML = '<strong>EV Share (%)</strong><br>';
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML += `<i style="background:${getColor(grades[i]+0.1)}; width:18px; height:18px; display:inline-block; margin-right:5px;"></i> ${grades[i]}${grades[i+1] ? '–'+grades[i+1] : '+'}%<br>`;
            }
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Adoption Germany – Historical Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        canvas {
            max-height: 600px;
        }
        .info {
            text-align: center;
            margin: 15px 0;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Germany – New Car Registrations by Powertrain (2000–2025)</h1>
        <p class="info">Percentage share of new passenger car registrations • Source: KBA & ACEA</p>
        <canvas id="germanyChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('germanyChart').getContext('2d');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: [
                    2000, 2005, 2010, 2015, 2018, 2019, 2020, 
                    2021, 2022, 2023, 2024, 2025
                ],
                datasets: [
                    {
                        label: 'Battery Electric (BEV)',
                        data: [0, 0, 0, 0.01, 0.2, 1.7, 6.6, 13.5, 17.7, 18.4, 13.5, 19.1],
                        borderColor: '#2c7a2c',
                        backgroundColor: 'rgba(44, 122, 44, 0.1)',
                        tension: 0.3,
                        borderWidth: 3,
                        pointRadius: 4
                    },
                    {
                        label: 'Plug-in Hybrid (PHEV)',
                        data: [0, 0, 0, 0, 0.1, 0.9, 3.0, 6.0, 8.5, 9.0, 6.8, 10.9],
                        borderColor: '#4ade80',
                        backgroundColor: 'rgba(74, 222, 128, 0.1)',
                        tension: 0.3,
                        borderWidth: 3,
                        pointRadius: 4
                    },
                    {
                        label: 'Hybrid (non-plug-in)',
                        data: [0, 0.1, 0.5, 1.5, 3.5, 5.5, 12.0, 18.5, 22.0, 28.0, 35.0, 39.5],
                        borderColor: '#facc15',
                        backgroundColor: 'rgba(250, 204, 21, 0.1)',
                        tension: 0.3,
                        borderWidth: 2.5
                    },
                    {
                        label: 'Petrol',
                        data: [55, 52, 48, 45, 38, 35, 32, 25, 22, 20, 35.2, 27.2],
                        borderColor: '#ef4444',
                        backgroundColor: 'rgba(239, 68, 68, 0.1)',
                        tension: 0.2
                    },
                    {
                        label: 'Diesel',
                        data: [40, 43, 45, 48, 52, 50, 40, 30, 25, 18, 15, 13.8],
                        borderColor: '#64748b',
                        backgroundColor: 'rgba(100, 116, 139, 0.1)',
                        tension: 0.2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: 'Development of Powertrain Shares in Germany (2000–2025)',
                        font: { size: 18 }
                    },
                    legend: {
                        position: 'top',
                        labels: { padding: 15, usePointStyle: true }
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        title: { display: true, text: 'Market Share (%)' }
                    },
                    x: {
                        title: { display: true, text: 'Year' }
                    }
                }
            }
        });
    </script>
</body>
</html>

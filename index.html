<style>
  body { 
    margin:0; 
    font-family: system-ui, sans-serif; 
    background:#0d1520; 
    color:#eee; 
    overflow:hidden; 
  }
  
  #map { 
    width:100vw; 
    height:100vh; 
    background:#0d1520; 
  }

  /* Suchleiste */
  #search-container {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 1000;

  }
  
  #search {
    width: 100%;
    padding: 12px 16px 12px 45px;
    border: none;
    border-radius: 30px;
    background: rgba(26, 35, 51, 0.95);
    color: #eee;
    font-size: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }
  
  #search:focus { 
    outline: none; 
    box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.4); 
  }
  
  #search::placeholder { 
    color: #aaa; 
  }

  .modal { 
    display:none; 
    position:fixed; 
    top:50%; 
    left:50%; 
    transform:translate(-50%,-50%); 
    width:90%; 
    max-width:920px; 
    background:#1a2333; 
    border-radius:12px; 
    box-shadow:0 10px 40px rgba(0,0,0,0.7); 
    z-index:2000; 
    overflow:hidden;
  }
  
  .modal-header { 
    padding:15px 20px; 
    background:#0f1828; 
    display:flex; 
    justify-content:space-between; 
    align-items:center; 
    border-bottom:1px solid #334155; 
  }
  
  .modal-content { padding:20px; }
  
  .tabs { 
    display:flex; 
    gap:8px; 
    margin-bottom:20px; 
    flex-wrap:wrap; 
  }
  
  .tab { 
    padding:9px 18px; 
    background:#334155; 
    border:none; 
    border-radius:8px; 
    color:#ccc; 
    cursor:pointer; 
    font-size:14px;
  }
  
  .tab.active { 
    background:#00e5ff; 
    color:#000; 
    font-weight:bold; 
  }
  
  .source { 
    font-size:0.85em; 
    color:#88aaff; 
    margin:12px 0; 
  }
</style>
</head>
<body>

<div id="map"></div>

<!-- Suchleiste -->
<div id="search-container">
  <input type="text" id="search" placeholder="Country search (e.g. Luxembourg, Germany...)" autocomplete="off">
</div>

<div id="modal" class="modal">
  <div class="modal-header">
    <h2 id="modal-title">Country</h2>
    <button onclick="document.getElementById('modal').style.display='none'" style="background:none;border:none;color:#ff6b35;font-size:1.8em;cursor:pointer;">×</button>
  </div>
  <div class="modal-content">
    <div class="tabs">
      <button class="tab active" onclick="switchTab(0)">Monthly total</button>
      <button class="tab" onclick="switchTab(1)">Powertrain absolute</button>
      <button class="tab" onclick="switchTab(2)">Market share %</button>
      <button class="tab" onclick="switchTab(3)">Stacked</button>
    </div>

    <canvas id="chart" height="280"></canvas>

    <div id="source-info" class="source"></div>

    <div style="margin-top:20px; display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:10px;" id="summary-cards"></div>
  </div>
</div>

<script>
// ==================== SUCHLEISTE ====================
const searchInput = document.getElementById("search");

searchInput.addEventListener("input", () => {
  const term = searchInput.value.toLowerCase().trim();
  
  d3.selectAll(".country-path")
    .attr("opacity", d => {
      const name = (d.properties.name || "").toLowerCase();
      return term === "" || name.includes(term) ? 1 : 0.25;
    });
});

searchInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    const term = searchInput.value.toLowerCase().trim();
    if (!term) return;

    const found = d3.selectAll(".country-path")
      .filter(d => (d.properties.name || "").toLowerCase().includes(term))
      .node();

    if (found) {
      const datum = d3.select(found).datum();
      const name = datum.properties.name;
      selectByName(name);
      openModal(name);
      searchInput.value = "";
    }
  }
});

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Adoption Worldmap – Europe Focus</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; }
        h1 { text-align: center; padding: 15px; background: #2c3e50; color: white; margin: 0; }
        #map { height: calc(100vh - 60px); width: 100%; }

        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-size: 14px; }

        .leaflet-popup-content-wrapper { width: 850px !important; max-width: 850px !important; }
        .leaflet-popup-content { width: 830px !important; margin: 0 !important; padding: 15px !important; }

        .chart-container {
            position: relative;
            width: 100% !important;
            height: 440px !important;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>EV Adoption Worldmap – Europe Focus (Monthly since 2010)</h1>
    <div id="map"></div>

    <script>
        let currentChart = null;

        const map = L.map('map').setView([54, 10], 4);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        function getColor(evShare) {
            if (evShare > 50) return '#006400';
            if (evShare > 30) return '#228B22';
            if (evShare > 15) return '#32CD32';
            if (evShare > 5)  return '#ADFF2F';
            if (evShare > 1)  return '#FFFF00';
            return '#FF6347';
        }

        function style(feature) {
            const ev = feature.properties.ev_share || 0;
            return { fillColor: getColor(ev), weight: 1.8, color: '#333', fillOpacity: 0.78 };
        }

        // ==================== Monatliche Daten seit 2010 ====================
        const monthlyData = {
            "Germany": {
                labels: ['2010','2012','2014','2016','2018','2020-01','2020-06','2020-12','2021-06','2021-12','2022-06','2022-12','2023-06','2023-12','2024-06','2024-12','2025-06','2025-12'],
                bev:    [0, 0, 0, 0.01, 0.2, 1.8, 4.5, 6.6, 10.2, 13.5, 14.8, 17.7, 16.5, 18.4, 13.2, 13.5, 18.5, 19.1],
                phev:   [0, 0, 0, 0, 0.1, 2.5, 3.0, 3.0, 5.8, 6.0, 7.8, 8.5, 8.0, 9.0, 6.4, 6.8, 10.5, 10.9],
                hybrid: [0, 0.1, 0.5, 1.5, 3.5, 8, 10, 12, 16, 19, 21, 23, 26, 28, 33, 35, 38, 39.5],
                petrol: [55, 52, 48, 45, 38, 45, 40, 32, 28, 25, 24, 22, 21, 20, 30, 35, 27, 27.2],
                diesel: [40, 43, 45, 48, 52, 37, 36, 38, 33, 30, 27, 24, 21, 18, 16, 15, 14, 13.8]
            },
            "Norway": {
                labels: ['2010','2012','2014','2016','2018','2020','2021','2022','2023','2024','2025-01','2025-06','2025-12'],
                bev:    [0.1, 0.5, 1.5, 5, 15, 54, 65, 80, 85, 88, 91, 93, 92],
                phev:   [0, 0, 0.5, 2, 8, 20, 15, 10, 8, 5, 4.5, 4, 5],
                hybrid: [0, 0.5, 2, 5, 10, 15, 12, 8, 5, 4, 3, 2.5, 2],
                petrol: [60, 55, 50, 45, 35, 8, 6, 2, 1.5, 2, 1.2, 0.8, 1],
                diesel: [35, 38, 40, 38, 30, 3, 2, 0.5, 0.5, 1, 0.3, 0.2, 0]
            },
            "Sweden": {
                labels: ['2010','2012','2014','2016','2018','2020','2021','2022','2023','2024','2025-06','2025-12'],
                bev:    [0, 0.1, 0.3, 1, 3, 10, 20, 25, 35, 40, 48, 48],
                phev:   [0, 0, 0.2, 1.5, 5, 15, 18, 15, 14, 13, 13.5, 13],
                hybrid: [0.5, 1, 2, 4, 8, 15, 20, 25, 28, 30, 24, 25],
                petrol: [55, 52, 50, 48, 45, 35, 25, 20, 15, 12, 10, 10],
                diesel: [40, 42, 43, 40, 35, 25, 20, 15, 12, 10, 4.5, 4]
            },
            "Netherlands": {
                labels: ['2010','2012','2014','2016','2018','2020','2021','2022','2023','2024','2025-06','2025-12'],
                bev:    [0, 0.2, 0.5, 1.5, 5, 15, 20, 25, 30, 35, 42, 42],
                phev:   [0, 0, 0.3, 2, 6, 10, 12, 13, 14, 14, 14.5, 14],
                hybrid: [1, 2, 3, 5, 10, 20, 25, 27, 28, 28, 27.5, 28],
                petrol: [50, 48, 45, 42, 38, 30, 25, 20, 18, 15, 12, 12],
                diesel: [45, 45, 47, 45, 38, 25, 20, 15, 12, 10, 4, 4]
            }
            // Weitere Länder können hier ergänzt werden
        };

        function createOrUpdateChart(canvasId, labels, datasets, chartTitle) {
            if (currentChart) currentChart.destroy();
            const ctx = document.getElementById(canvasId);
            currentChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: chartTitle, font: { size: 16 } },
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true, max: 100, title: { display: true, text: 'Market Share (%)' } }
                    }
                }
            });
        }

        function showCountryChart(countryName) {
            const data = monthlyData[countryName];
            if (!data) {
                alert(`No monthly data available for ${countryName} yet.`);
                return;
            }

            const popupDiv = document.createElement('div');
            popupDiv.innerHTML = `
                <h3>${countryName} – Monthly New Car Registrations (2010–2025)</h3>
                <p style="text-align:center; color:#555; margin:5px 0 10px;">Market share by powertrain</p>
                <div class="chart-container">
                    <canvas id="countryChart"></canvas>
                </div>
            `;

            L.popup({ maxWidth: 850 }).setLatLng(map.getCenter()).setContent(popupDiv).openOn(map);

            setTimeout(() => {
                const datasets = [
                    { label: 'BEV (%)', borderColor: '#2c7a2c', data: data.bev, tension: 0.3, borderWidth: 3.5 },
                    { label: 'PHEV (%)', borderColor: '#4ade80', data: data.phev, tension: 0.3, borderWidth: 3.5 },
                    { label: 'Hybrid (non-plug)', borderColor: '#facc15', data: data.hybrid, tension: 0.25 },
                    { label: 'Petrol (%)', borderColor: '#ef4444', data: data.petrol },
                    { label: 'Diesel (%)', borderColor: '#64748b', data: data.diesel }
                ];
                createOrUpdateChart('countryChart', data.labels, datasets, `${countryName} – Monthly Development 2010–2025`);
            }, 350);
        }

        // Karte laden
        fetch('https://raw.githubusercontent.com/leakyMirror/map-of-europe/master/GeoJSON/europe.geojson')
            .then(res => res.json())
            .then(data => {
                const evData = { "Norway":97, "Sweden":61, "Denmark":69, "Netherlands":56, "Germany":30, "Belgium":43, "France":28, "United Kingdom":33, "Italy":11, "Spain":19 };

                data.features.forEach(f => {
                    const name = f.properties.name || f.properties.NAME;
                    if (name && evData[name] !== undefined) f.properties.ev_share = evData[name];
                });

                L.geoJSON(data, {
                    style: style,
                    onEachFeature: function(feature, layer) {
                        const name = feature.properties.name || feature.properties.NAME;
                        const ev = feature.properties.ev_share || 0;

                        layer.bindTooltip(`<strong>${name}</strong><br>EV Share: <b>${ev}%</b> (2025)`, { sticky: true });

                        layer.on('click', function() {
                            showCountryChart(name);
                        });
                    }
                }).addTo(map);
            })
            .catch(err => console.error(err));

        // Legende
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            const grades = [0, 1, 5, 15, 30, 50];
            div.innerHTML = '<strong>EV Share (%)</strong><br>';
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML += `<i style="background:${getColor(grades[i]+0.1)}; width:18px; height:18px; display:inline-block; margin-right:5px;"></i> ${grades[i]}${grades[i+1] ? '–'+grades[i+1] : '+'}%<br>`;
            }
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>

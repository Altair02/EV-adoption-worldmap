<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EV Adoption World Map</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson@3"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  body { margin:0; font-family: system-ui, sans-serif; background:#0d1520; color:#eee; overflow:hidden; }
  #map { width:100vw; height:100vh; background:#0d1520; }

  /* Suchleiste */
  #search-container {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 1000;
    width: 320px;
  }
  #search {
    width: 100%;
    padding: 12px 16px 12px 45px;
    border: none;
    border-radius: 30px;
    background: rgba(26, 35, 51, 0.95);
    color: #eee;
    font-size: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }
  #search:focus { outline: none; box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.4); }
  #search::placeholder { color: #aaa; }

  .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:90%; max-width:920px; background:#1a2333; border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,0.7); z-index:2000; overflow:hidden; }
  .modal-header { padding:15px 20px; background:#0f1828; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #334155; }
  .modal-content { padding:20px; }
  .tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .tab { padding:9px 18px; background:#334155; border:none; border-radius:8px; color:#ccc; cursor:pointer; font-size:14px; }
  .tab.active { background:#00e5ff; color:#000; font-weight:bold; }
  .source { font-size:0.85em; color:#88aaff; margin:12px 0; }
</style>
</head>
<body>

<div id="map"></div>

<!-- Suchleiste -->
<div id="search-container">
  <input type="text" id="search" placeholder="Country search" autocomplete="off">
</div>

<div id="modal" class="modal">
  <div class="modal-header">
    <h2 id="modal-title">Country</h2>
    <button onclick="document.getElementById('modal').style.display='none'" style="background:none;border:none;color:#ff6b35;font-size:1.8em;cursor:pointer;">×</button>
  </div>
  <div class="modal-content">
    <div class="tabs">
      <button class="tab active" onclick="switchTab(0)">Monthly total</button>
      <button class="tab" onclick="switchTab(1)">Powertrain absolute</button>
      <button class="tab" onclick="switchTab(2)">Market share %</button>
      <button class="tab" onclick="switchTab(3)">Stacked</button>
    </div>

    <canvas id="chart" height="280"></canvas>

    <div id="source-info" class="source"></div>

    <div style="margin-top:20px; display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:10px;" id="summary-cards"></div>
  </div>
</div>

<script>
// ==================== SUCHLEISTE ====================
const searchInput = document.getElementById("search");

searchInput.addEventListener("input", () => {
  const term = searchInput.value.toLowerCase().trim();
  d3.selectAll(".country-path")
    .attr("opacity", d => {
      const name = (d.properties.name || "").toLowerCase();
      return term === "" || name.includes(term) ? 1 : 0.25;
    });
});

searchInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    const term = searchInput.value.toLowerCase().trim();
    if (!term) return;
    const found = d3.selectAll(".country-path")
      .filter(d => (d.properties.name || "").toLowerCase().includes(term))
      .node();
    if (found) {
      const datum = d3.select(found).datum();
      const name = datum.properties.name;
      selectByName(name);
      openModal(name);
      searchInput.value = "";
    }
  }
});

// ==================== DEIN ORIGINALER CODE (unverändert) ====================
let currentYear = 2024;
let selectedCountry = null;
let currentChart = null;

async function loadCountryData(name) {
  const fileKey = name.toLowerCase().replace(/ /g, "_");
  try {
    const res = await fetch(`data/countries/${fileKey}.json`);
    return await res.json();
  } catch(e) {
    console.error("Failed to load", name);
    return null;
  }
}

async function openModal(countryName) {
  const data = await loadCountryData(countryName);
  if (!data) return;

  selectedCountry = countryName;
  document.getElementById("modal-title").textContent = data.name;
  document.getElementById("modal").style.display = "block";

  document.getElementById("source-info").innerHTML = `
    <strong>Monthly:</strong> ${data.source_monthly}<br>
    <strong>Annual powertrain:</strong> ${data.source_annual}
  `;

  renderMonthlyChart(data);
}

function renderMonthlyChart(data) {
  const ctx = document.getElementById("chart");
  if (currentChart) currentChart.destroy();

  currentChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.monthly.labels,
      datasets: [{
        label: 'Total registrations',
        data: data.monthly.total,
        borderColor: '#00e5ff',
        tension: 0.3,
        borderWidth: 3,
        pointRadius: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { grid: { color: '#334155' }, ticks: { color: '#aaa' } },
        x: { grid: { color: '#334155' }, ticks: { color: '#aaa', maxTicksLimit: 12 } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function switchTab(tabIndex) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
  if (selectedCountry) openModal(selectedCountry);
}

// ==================== D3 WORLD MAP (dein Original-Code) ====================
async function init() {
  const width = window.innerWidth;
  const height = window.innerHeight;

  const svg = d3.select("#map").append("svg")
    .attr("width", width)
    .attr("height", height);

  const projection = d3.geoNaturalEarth1()
    .scale(180)
    .translate([width/2, height/2 + 20]);

  const pathGen = d3.geoPath().projection(projection);

  const tooltip = d3.select("body").append("div")
    .attr("class", "tooltip")
    .style("position", "absolute")
    .style("background", "rgba(0,0,0,0.8)")
    .style("color", "#fff")
    .style("padding", "8px 12px")
    .style("border-radius", "6px")
    .style("pointer-events", "none")
    .style("display", "none");

  // Load world map
  const world = await d3.json("https://unpkg.com/world-atlas@2/countries-110m.json");
  const countries = topojson.feature(world, world.objects.countries);

  // Draw map
  svg.append("path")
    .datum({type: "Sphere"})
    .attr("d", pathGen)
    .attr("fill", "#0d1520");

  svg.append("path")
    .datum(d3.geoGraticule()())
    .attr("d", pathGen)
    .attr("fill", "none")
    .attr("stroke", "rgba(0,229,255,0.04)")
    .attr("stroke-width", "0.3");

  svg.selectAll(".country-path")
    .data(countries.features)
    .join("path")
    .attr("class", "country-path")
    .attr("d", pathGen)
    .attr("fill", "#1a2333")
    .attr("stroke", "#334155")
    .attr("stroke-width", "0.6")
    .on("mousemove", (event, d) => {
      tooltip.style("display", "block")
        .style("left", (event.pageX + 10) + "px")
        .style("top", (event.pageY + 10) + "px")
        .text(d.properties.name);
    })
    .on("mouseleave", () => tooltip.style("display", "none"))
    .on("click", (event, d) => {
      const name = d.properties.name;
      openModal(name);
    });

  console.log("Map loaded with search bar");
}

init();
</script>
</body>
</html>

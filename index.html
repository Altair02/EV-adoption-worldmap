<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EV Adoption World Map</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson@3"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  body { margin:0; font-family: system-ui, sans-serif; background:#0d1520; color:#eee; }
  #map { width:100vw; height:100vh; background:#0d1520; }
  .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:90%; max-width:900px; background:#1a2333; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.6); z-index:1000; overflow:hidden; }
  .modal-header { padding:15px 20px; background:#0f1828; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #334155; }
  .modal-content { padding:20px; }
  .tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .tab { padding:8px 16px; background:#334155; border:none; border-radius:8px; color:#ccc; cursor:pointer; }
  .tab.active { background:#00e5ff; color:#000; font-weight:bold; }
  .source { font-size:0.85em; color:#88aaff; margin-top:10px; }
</style>
</head>
<body>

<div id="map"></div>

<div id="modal" class="modal">
  <div class="modal-header">
    <h2 id="modal-title">Country</h2>
    <button onclick="document.getElementById('modal').style.display='none'" style="background:none;border:none;color:#ff6b35;font-size:1.5em;cursor:pointer;">×</button>
  </div>
  <div class="modal-content">
    <div class="tabs">
      <button class="tab active" onclick="switchTab(0)">Monthly total</button>
      <button class="tab" onclick="switchTab(1)">Powertrain absolute</button>
      <button class="tab" onclick="switchTab(2)">Market share %</button>
      <button class="tab" onclick="switchTab(3)">Stacked</button>
    </div>

    <canvas id="chart" height="280"></canvas>

    <div id="source-info" class="source"></div>

    <div style="margin-top:20px; display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:10px;" id="summary-cards"></div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const FILE_MAP = {
  "Germany": "germany",
  "Netherlands": "netherlands",
  // ... (deine anderen Länder bleiben gleich)
};

let currentChart = null;
let selectedCountry = null;
let currentYear = 2024;

// ==================== LOAD COUNTRY DATA ====================
async function loadCountryData(name) {
  const fileKey = FILE_MAP[name] || name.toLowerCase().replace(/ /g, "_");
  try {
    const res = await fetch(`data/countries/${fileKey}.json`);
    const data = await res.json();
    return data;
  } catch(e) {
    console.error("Failed to load", name, e);
    return null;
  }
}

// ==================== SHOW MODAL ====================
async function openModal(countryName) {
  const data = await loadCountryData(countryName);
  if (!data) return;

  selectedCountry = countryName;
  document.getElementById("modal-title").textContent = data.name;
  document.getElementById("modal").style.display = "block";

  // WICHTIG: Source aus dem JSON anzeigen
  const sourceEl = document.getElementById("source-info");
  sourceEl.innerHTML = `
    <strong>Monthly:</strong> ${data.source_monthly}<br>
    <strong>Annual powertrain:</strong> ${data.source_annual}
  `;

  renderMonthlyChart(data);
  renderSummaryCards(data);
}

// ==================== MONTHLY CHART ====================
function renderMonthlyChart(data) {
  const ctx = document.getElementById("chart");
  if (currentChart) currentChart.destroy();

  const labels = data.monthly.labels || [];
  const totals = data.monthly.total || [];

  currentChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Total registrations',
        data: totals,
        borderColor: '#00e5ff',
        tension: 0.3,
        borderWidth: 3,
        pointRadius: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { grid: { color: '#334155' }, ticks: { color: '#aaa' } },
        x: { grid: { color: '#334155' }, ticks: { color: '#aaa', maxTicksLimit: 12 } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

// ==================== SUMMARY CARDS ====================
function renderSummaryCards(data) {
  const cardsContainer = document.getElementById("summary-cards");
  cardsContainer.innerHTML = "";

  const annual = data.annual || {};
  const lastYear = annual.labels ? annual.labels[annual.labels.length-1] : "2024";

  const fuels = [
    {key:"bev",    label:"BEV",    color:"#00e5ff"},
    {key:"phev",   label:"PHEV",   color:"#22ff88"},
    {key:"hybrid", label:"HYBRID (NON-PLUG)", color:"#ffcc33"},
    {key:"petrol", label:"PETROL / GASOLINE", color:"#ff6b35"},
    {key:"diesel", label:"DIESEL", color:"#ff3366"},
    {key:"other",  label:"OTHER / LPG", color:"#bb88ff"}
  ];

  fuels.forEach(f => {
    const value = annual[f.key] ? annual[f.key][annual[f.key].length-1] || 0 : 0;
    const percent = annual.labels && annual.labels.length > 0 
      ? (value / annual.labels.reduce((sum, y, i) => sum + (annual.bev[i]||0) + (annual.phev[i]||0) + (annual.hybrid[i]||0) + (annual.petrol[i]||0) + (annual.diesel[i]||0) + (annual.other[i]||0), 0) * 100).toFixed(1)
      : "0.0";

    const card = document.createElement("div");
    card.style.cssText = `background:#1f2a44; padding:12px; border-radius:10px; text-align:center;`;
    card.innerHTML = `
      <div style="font-size:1.4em; font-weight:bold; color:${f.color}">${(value/1000).toFixed(0)} k</div>
      <div style="font-size:0.85em; color:#aaa">${f.label}</div>
      <div style="font-size:0.8em; color:#88aaff">${percent}% (${lastYear})</div>
    `;
    cardsContainer.appendChild(card);
  });
}

// Tab switching (für die anderen Tabs kannst du später erweitern)
function switchTab(tabIndex) {
  // Für jetzt nur Monthly aktiv halten – andere Tabs können später implementiert werden
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
  if (selectedCountry) openModal(selectedCountry); // refresh
}

// ==================== MAP INIT (unverändert) ====================
// ... (dein bestehender D3 Map Code bleibt genau gleich)

// Am Ende der Datei:
init();   // deine bestehende init-Funktion
</script>
</body>
</html>

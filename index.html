<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Car Registrations</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0a0e17;
    --surface: #111827;
    --border:  #1e2d45;
    --accent:  #00e5ff;
    --accent2: #ff6b35;
    --text:    #e2e8f0;
    --muted:   #64748b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 24px; }

  header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .title-block h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; letter-spacing: -0.03em; line-height: 1.1; background: linear-gradient(135deg, #fff 40%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { color: var(--muted); font-size: 0.75rem; margin-top: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .meta-block { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .update-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2); border-radius: 20px; padding: 5px 12px; font-size: 0.7rem; color: var(--accent); }
  .update-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(.7); } }
  .year-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 0.75rem; cursor: pointer; outline: none; }
  .year-select:focus { border-color: var(--accent); }

  .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
  .map-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; }
  .map-panel svg { width: 100%; height: auto; display: block; }
  .country-path { stroke: rgba(0,229,255,0.12); stroke-width: 0.4px; transition: all 0.15s; cursor: pointer; }
  .country-path:hover { stroke: var(--accent); stroke-width: 1px; filter: brightness(1.4); }
  .country-path.selected { stroke: var(--accent2); stroke-width: 1.5px; }
  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .panel-title { font-family: 'Syne', sans-serif; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .legend-bar { height: 10px; border-radius: 5px; background: linear-gradient(to right, #0a3d62, #1565c0, #2196f3, #00bcd4, #00e5ff, #00ffcc); margin-bottom: 8px; }
  .legend-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--muted); }
  .sources-note { font-size: 0.62rem; color: var(--muted); margin-top: 10px; line-height: 1.6; }
  .sources-note a { color: var(--accent); text-decoration: none; }
  .country-name { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; color: #fff; }
  .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.72rem; }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--muted); }
  .stat-value { color: var(--text); }
  .stat-value.hl { color: var(--accent); }
  .top-list { display: flex; flex-direction: column; gap: 8px; }
  .top-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; background: rgba(255,255,255,0.02); border: 1px solid transparent; cursor: pointer; transition: all 0.15s; font-size: 0.72rem; }
  .top-item:hover { border-color: var(--border); background: rgba(0,229,255,0.05); }
  .top-rank { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.65rem; color: var(--muted); width: 18px; text-align: center; }
  .top-bar-wrap { flex: 1; }
  .top-bar-label { margin-bottom: 3px; }
  .top-bar-track { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .top-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(to right, #2196f3, #00e5ff); }
  .top-value { color: var(--accent); font-size: 0.68rem; white-space: nowrap; }
  .open-chart-btn { margin-top: 14px; width: 100%; padding: 9px; background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.4); color: var(--accent); border-radius: 8px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.72rem; transition: all .15s; }
  .open-chart-btn:hover { background: rgba(0,229,255,0.15); }

  /* Tooltip */
  #tooltip { position: fixed; background: rgba(10,14,23,0.95); border: 1px solid var(--accent); border-radius: 8px; padding: 10px 14px; font-size: 0.72rem; pointer-events: none; z-index: 999; display: none; max-width: 220px; backdrop-filter: blur(8px); }
  #tooltip strong { font-family: 'Syne', sans-serif; font-size: 0.85rem; display: block; margin-bottom: 4px; color: #fff; }
  .tt-row { display: flex; justify-content: space-between; gap: 16px; color: var(--muted); margin-top: 3px; }
  .tt-val { color: var(--accent); }

  /* Modal */
  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
  #modal-overlay.open { display: flex; }
  #modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 860px; max-height: 92vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 80px rgba(0,229,255,0.1); animation: modalIn .2s ease; }
  @keyframes modalIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  #modal-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 22px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem; color: #fff; }
  #modal-subtitle { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }
  #modal-source { font-size: 0.6rem; color: var(--muted); margin-top: 2px; }
  #modal-close { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
  #modal-close:hover { background: rgba(255,107,53,0.2); border-color: var(--accent2); color: var(--accent2); }
  #modal-body { padding: 20px 24px 24px; overflow-y: auto; }
  #modal-loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 0.8rem; }
  .modal-spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .chart-tabs { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .chart-tab { padding: 5px 14px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; transition: all .15s; }
  .chart-tab.active { background: rgba(0,229,255,0.12); border-color: var(--accent); color: var(--accent); }
  .chart-tab:hover:not(.active) { border-color: var(--muted); color: var(--text); }
  .tab-source { font-size: 0.62rem; color: var(--muted); margin-bottom: 12px; }
  .chart-wrap { position: relative; height: 280px; }   /* ← feste Höhe, kein Wachsen mehr */
  .summary-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 16px; }
  .summary-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 10px 6px; text-align: center; }
  .sc-val { font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700; margin-bottom: 3px; }
  .sc-label { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .sc-pct { font-size: 0.58rem; color: var(--muted); margin-top: 2px; }
  .no-data-msg { text-align: center; padding: 50px 0; color: var(--muted); font-size: 0.8rem; line-height: 2; }

  #map-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--surface); flex-direction: column; gap: 12px; z-index: 10; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  #map-loading p { font-size: 0.72rem; color: var(--muted); }

  /* Suchleiste */
  #search-container {
    position: absolute;
    top: 24px;
    left: 24px;
    z-index: 1000;
    width: 280px;
  }
  #search {
    width: 100%;
    padding: 12px 16px 12px 45px;
    border: none;
    border-radius: 30px;
    background: rgba(26, 35, 51, 0.95);
    color: #eee;
    font-size: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }
  #search:focus { outline: none; box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.4); }
  #search::placeholder { color: #aaa; }

  @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } header { flex-direction: column; gap: 12px; } .meta-block { align-items: flex-start; } .summary-grid { grid-template-columns: repeat(3,1fr); } }
  @media (max-width: 500px) { .summary-grid { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>

<div id="tooltip"> ... (unverändert) </div>

<div id="modal-overlay"> ... (unverändert) </div>

<div class="container">
  <header> ... (unverändert) </header>

  <div class="main-grid">
    <div class="map-panel">
      <div id="map-loading"><div class="spinner"></div><p>Loading map…</p></div>
      <svg id="map-svg" viewBox="0 0 960 500"></svg>
    </div>
    <div class="sidebar"> ... (unverändert) </div>
  </div>
</div>

<!-- Suchleiste -->
<div id="search-container">
  <input type="text" id="search" placeholder="Country search" autocomplete="off">
</div>

<script>
// ── Annual totals for world map colouring ─────────────────────────────────────

const svg     = d3.select("#map-svg");
const proj    = d3.geoNaturalEarth1().scale(153).translate([480,270]);
const pathGen = d3.geoPath().projection(proj);

// ── Suchleiste ───────────────────────────────────────────────────────────────
const searchInput = document.getElementById("search");
searchInput.addEventListener("input", () => {
  const term = searchInput.value.toLowerCase().trim();
  svg.selectAll(".country-path")
    .attr("opacity", d => {
      const name = (d.properties.name || "").toLowerCase();
      return term === "" || name.includes(term) ? 1 : 0.25;
    });
});

// Enter drücken → Land öffnen (optional, aber praktisch)
searchInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    const term = searchInput.value.toLowerCase().trim();
    if (!term) return;
    const found = svg.selectAll(".country-path")
      .filter(d => (d.properties.name || "").toLowerCase().includes(term))
      .node();
    if (found) {
      const name = normName(d3.select(found).datum().properties.name);
      selectByName(name);
      openModal(name);
      searchInput.value = "";
    }
  }
});

// renderMap, renderTopList, showDetail, showTip, openModal usw. bleiben exakt wie bei dir

</body>
</html>

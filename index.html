<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Adoption Worldmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; }
        h1 { text-align: center; padding: 15px; background: #2c3e50; color: white; margin: 0; }
        #map { height: calc(100vh - 60px); width: 100%; }
        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-size: 14px; }
        .germany-popup { min-width: 780px; max-width: 950px; padding: 10px; }
        .germany-popup h3 { margin-top: 5px; text-align: center; }
    </style>
</head>
<body>
    <h1>EV Adoption Worldmap – Europe Focus</h1>
    <div id="map"></div>

    <script src="data/countries.json"></script>

    <script>
        const map = L.map('map').setView([55, 10], 4);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function getColor(evShare) {
            if (evShare > 50) return '#006400';
            if (evShare > 30) return '#228B22';
            if (evShare > 15) return '#32CD32';
            if (evShare > 5)  return '#ADFF2F';
            if (evShare > 1)  return '#FFFF00';
            return '#FF6347';
        }

        function style(feature) {
            return {
                fillColor: getColor(feature.properties.ev_share || 0),
                weight: 1.5,
                color: 'white',
                fillOpacity: 0.75
            };
        }

        // Monatliche Daten für Deutschland (2020–2025) – Marktanteile in %
        const germanyMonthly = {
            labels: ['2020-01','2020-06','2020-12','2021-06','2021-12','2022-06','2022-12','2023-06','2023-12','2024-06','2024-12','2025-01','2025-04','2025-07','2025-10','2025-12'],
            bev:   [1.5, 4.2, 6.6, 10.2, 13.5, 14.8, 17.7, 16.5, 18.4, 13.2, 13.5, 16.6, 18.8, 19.5, 19.2, 19.1],
            phev:  [2.8, 3.1, 3.0, 5.8, 6.0, 7.8, 8.5, 8.0, 9.0, 6.4, 6.8, 8.5, 10.2, 10.6, 10.8, 10.9],
            hybrid:[7, 9, 12, 16, 19, 21, 23, 26, 28, 33, 35, 36, 37, 38, 39, 39.5],
            petrol:[48, 42, 35, 29, 26, 25, 23, 22, 20, 32, 35, 29, 26, 25, 26.5, 27.2],
            diesel:[37, 36, 38, 33, 30, 27, 24, 21, 18, 15, 15, 14.5, 14, 13.8, 13.8, 13.8]
        };

        function showGermanyChart() {
            const popupDiv = document.createElement('div');
            popupDiv.className = 'germany-popup';
            popupDiv.innerHTML = `
                <h3>Germany – Monthly New Car Registrations by Powertrain (2020–2025)</h3>
                <p style="text-align:center; color:#555; font-size:14px;">Market share in % • Source: KBA</p>
                <canvas id="deChart" width="850" height="420"></canvas>
            `;

            const popup = L.popup({
                maxWidth: 980,
                className: 'germany-popup'
            })
            .setLatLng([51.2, 10.4])
            .setContent(popupDiv)
            .openOn(map);

            // Warten bis der Canvas wirklich im DOM ist
            setTimeout(() => {
                const canvas = document.getElementById('deChart');
                if (!canvas) {
                    console.error("Canvas not found!");
                    return;
                }

                new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: germanyMonthly.labels,
                        datasets: [
                            { label: 'BEV (%)',          data: germanyMonthly.bev,    borderColor: '#2c7a2c', backgroundColor: 'rgba(44,122,44,0.1)',   tension: 0.3, borderWidth: 3.5, pointRadius: 3 },
                            { label: 'PHEV (%)',         data: germanyMonthly.phev,   borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.1)', tension: 0.3, borderWidth: 3.5, pointRadius: 3 },
                            { label: 'Hybrid (non-plug)',data: germanyMonthly.hybrid, borderColor: '#facc15', tension: 0.25, borderWidth: 2.5 },
                            { label: 'Petrol (%)',       data: germanyMonthly.petrol, borderColor: '#ef4444', tension: 0.2 },
                            { label: 'Diesel (%)',       data: germanyMonthly.diesel, borderColor: '#64748b', tension: 0.2 }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top', labels: { padding: 12 } },
                            tooltip: { mode: 'index', intersect: false }
                        },
                        scales: {
                            y: { beginAtZero: true, max: 100, title: { display: true, text: 'Market Share (%)' } },
                            x: { title: { display: true, text: 'Month / Year' } }
                        }
                    }
                });
            }, 500);   // etwas längere Verzögerung für Sicherheit
        }

        function onEachFeature(feature, layer) {
            const p = feature.properties;
            layer.bindTooltip(`<strong>${p.name}</strong><br>EV Share: <b>${p.ev_share || 0}%</b> (${p.year})`, { sticky: true });

            layer.on('click', function () {
                if (p.name === "Germany" || p.name === "Germany") {
                    showGermanyChart();
                } else {
                    L.popup()
                        .setLatLng(layer.getBounds().getCenter())
                        .setContent(`<h3>${p.name}</h3><p>EV Share: <strong>${p.ev_share}%</strong><br>BEV: ${p.bev}% | PHEV: ${p.phev}%</p>`)
                        .openOn(map);
                }
            });
        }

        L.geoJSON(countriesData, {
            style: style,
            onEachFeature: onEachFeature
        }).addTo(map);

        // Legende
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            const grades = [0, 1, 5, 15, 30, 50];
            div.innerHTML = '<strong>EV Share of New Cars (%)</strong><br>';
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML += `<i style="background:${getColor(grades[i]+0.1)}; width:18px; height:18px; display:inline-block; margin-right:5px;"></i> ${grades[i]}${grades[i+1] ? '–'+grades[i+1] : '+'}%<br>`;
            }
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>

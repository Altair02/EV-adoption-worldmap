<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Adoption Worldmap – Europe Focus</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; }
        h1 { text-align: center; padding: 15px; background: #2c3e50; color: white; margin: 0; }
        #map { height: calc(100vh - 60px); width: 100%; }
        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-size: 14px; }
        .germany-popup { min-width: 800px; max-width: 960px; padding: 15px; }
        .germany-popup h3 { margin: 8px 0 12px 0; text-align: center; color: #2c3e50; }
    </style>
</head>
<body>
    <h1>EV Adoption Worldmap – Europe Focus</h1>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([54, 10], 4);

        // Saubere Karte ohne Städtenamen
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd'
        }).addTo(map);

        function getColor(evShare) {
            if (evShare > 50) return '#006400';
            if (evShare > 30) return '#228B22';
            if (evShare > 15) return '#32CD32';
            if (evShare > 5)  return '#ADFF2F';
            if (evShare > 1)  return '#FFFF00';
            return '#FF6347';
        }

        function style(feature) {
            const ev = feature.properties.ev_share || 0;
            return {
                fillColor: getColor(ev),
                weight: 1.8,
                color: '#333',
                fillOpacity: 0.78
            };
        }

        // Monatliche Daten für Deutschland (2020–2025)
        const germanyMonthly = {
            labels: ['2020-01','2020-06','2020-12','2021-06','2021-12','2022-06','2022-12','2023-06','2023-12','2024-06','2024-12','2025-01','2025-04','2025-07','2025-10','2025-12'],
            bev:    [1.5, 4.2, 6.6, 10.2, 13.5, 14.8, 17.7, 16.5, 18.4, 13.2, 13.5, 16.6, 18.8, 19.5, 19.2, 19.1],
            phev:   [2.8, 3.1, 3.0, 5.8, 6.0, 7.8, 8.5, 8.0, 9.0, 6.4, 6.8, 8.5, 10.2, 10.6, 10.8, 10.9],
            hybrid: [7, 9, 12, 16, 19, 21, 23, 26, 28, 33, 35, 36, 37, 38, 39, 39.5],
            petrol: [48, 42, 35, 29, 26, 25, 23, 22, 20, 32, 35, 29, 26, 25, 26.5, 27.2],
            diesel: [37, 36, 38, 33, 30, 27, 24, 21, 18, 15, 15, 14.5, 14, 13.8, 13.8, 13.8]
        };

        function showGermanyChart() {
            const popupDiv = document.createElement('div');
            popupDiv.className = 'germany-popup';
            popupDiv.innerHTML = `
                <h3>Germany – Monthly New Car Registrations by Powertrain (2020–2025)</h3>
                <p style="text-align:center; color:#555; font-size:14px;">Market share in % • Source: KBA</p>
                <canvas id="deChart" width="860" height="430"></canvas>
            `;

            L.popup({ maxWidth: 1000 }).setLatLng([51.2, 10.4]).setContent(popupDiv).openOn(map);

            setTimeout(() => {
                const ctx = document.getElementById('deChart');
                if (!ctx) return;
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: germanyMonthly.labels,
                        datasets: [
                            { label: 'BEV (%)', data: germanyMonthly.bev, borderColor: '#2c7a2c', tension: 0.3, borderWidth: 3.5 },
                            { label: 'PHEV (%)', data: germanyMonthly.phev, borderColor: '#4ade80', tension: 0.3, borderWidth: 3.5 },
                            { label: 'Hybrid (non-plug)', data: germanyMonthly.hybrid, borderColor: '#facc15', tension: 0.25 },
                            { label: 'Petrol (%)', data: germanyMonthly.petrol, borderColor: '#ef4444', tension: 0.2 },
                            { label: 'Diesel (%)', data: germanyMonthly.diesel, borderColor: '#64748b', tension: 0.2 }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'top' }, tooltip: { mode: 'index', intersect: false } },
                        scales: { y: { beginAtZero: true, max: 100 } }
                    }
                });
            }, 400);
        }

        // GeoJSON direkt von einer guten Quelle laden
        fetch('https://raw.githubusercontent.com/leakyMirror/map-of-europe/master/GeoJSON/europe.geojson')
            .then(response => response.json())
            .then(data => {
                // EV-Daten zu den Ländern hinzufügen (matching per name)
                const evData = {
                    "Norway": {ev_share: 97, bev: 92, phev: 5},
                    "Sweden": {ev_share: 61, bev: 48, phev: 13},
                    "Denmark": {ev_share: 69, bev: 55, phev: 14},
                    "Netherlands": {ev_share: 56, bev: 42, phev: 14},
                    "Germany": {ev_share: 30, bev: 19.1, phev: 10.9},
                    "Belgium": {ev_share: 43, bev: 30, phev: 13},
                    "France": {ev_share: 28, bev: 20, phev: 8},
                    "United Kingdom": {ev_share: 33, bev: 25, phev: 8},
                    "Italy": {ev_share: 11, bev: 6, phev: 5},
                    "Spain": {ev_share: 19, bev: 12, phev: 7}
                    // Du kannst hier weitere Länder hinzufügen
                };

                data.features.forEach(feature => {
                    const name = feature.properties.name || feature.properties.NAME;
                    if (name && evData[name]) {
                        feature.properties.ev_share = evData[name].ev_share;
                        feature.properties.bev = evData[name].bev;
                        feature.properties.phev = evData[name].phev;
                        feature.properties.year = "2025";
                    }
                });

                const geoLayer = L.geoJSON(data, {
                    style: style,
                    onEachFeature: function(feature, layer) {
                        const p = feature.properties;
                        if (p.ev_share) {
                            layer.bindTooltip(`<strong>${p.name || p.NAME}</strong><br>EV Share: <b>${p.ev_share}%</b>`, { sticky: true });
                        }

                        layer.on('click', function() {
                            if ((p.name || p.NAME) === "Germany") {
                                showGermanyChart();
                            }
                        });
                    }
                }).addTo(map);

                // Ländernamen als Label
                geoLayer.eachLayer(layer => {
                    const name = layer.feature.properties.name || layer.feature.properties.NAME;
                    if (name) {
                        const center = layer.getBounds().getCenter();
                        L.marker(center, {
                            icon: L.divIcon({
                                className: 'country-label',
                                html: `<b>${name}</b>`,
                                iconSize: [100, 30],
                                iconAnchor: [50, 15]
                            })
                        }).addTo(map);
                    }
                });
            })
            .catch(err => console.error("Fehler beim Laden der GeoJSON:", err));

        // Legende
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            const grades = [0, 1, 5, 15, 30, 50];
            div.innerHTML = '<strong>EV Share (%)</strong><br>';
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML += `<i style="background:${getColor(grades[i]+0.1)}; width:18px; height:18px; display:inline-block; margin-right:5px;"></i> ${grades[i]}${grades[i+1] ? '–'+grades[i+1] : '+'}%<br>`;
            }
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Adoption Worldmap – Europe Focus</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; }
        h1 { text-align: center; padding: 15px; background: #2c3e50; color: white; margin: 0; }
        #map { height: calc(100vh - 60px); width: 100%; }

        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-size: 14px; }

        .leaflet-popup-content-wrapper { width: 820px !important; max-width: 820px !important; }
        .leaflet-popup-content { width: 800px !important; margin: 0 !important; padding: 15px !important; }

        .chart-container {
            position: relative;
            width: 100% !important;
            height: 430px !important;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>EV Adoption Worldmap – Europe Focus</h1>
    <div id="map"></div>

    <script>
        let currentChart = null;

        const map = L.map('map').setView([54, 10], 4);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        function getColor(evShare) {
            if (evShare > 50) return '#006400';
            if (evShare > 30) return '#228B22';
            if (evShare > 15) return '#32CD32';
            if (evShare > 5)  return '#ADFF2F';
            if (evShare > 1)  return '#FFFF00';
            return '#FF6347';
        }

        function style(feature) {
            const ev = feature.properties.ev_share || 0;
            return { fillColor: getColor(ev), weight: 1.8, color: '#333', fillOpacity: 0.78 };
        }

        // ==================== Monatliche Daten für alle Länder (2025) ====================
        const monthlyData2025 = {
            "Germany": {
                labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
                bev:    [16.5, 17.2, 18.1, 18.8, 19.5, 19.0, 19.8, 18.5, 19.2, 20.1, 19.7, 19.1],
                phev:   [9.5, 9.8, 10.2, 10.6, 10.8, 10.5, 11.0, 10.4, 10.7, 11.2, 11.0, 10.9],
                hybrid: [37, 37.5, 38, 38.5, 39, 39.5, 39.8, 39.2, 39.5, 40, 39.7, 39.5],
                petrol: [28, 27.5, 27, 26.5, 26, 26.5, 25.5, 27, 26.5, 25, 26, 27.2],
                diesel: [14.5, 14.2, 14, 13.8, 13.5, 13.8, 13.5, 14, 13.8, 13.5, 13.8, 13.8]
            },
            "Norway": {
                labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
                bev:    [90, 91, 92, 93, 94, 93, 92, 91, 93, 94, 93, 92],
                phev:   [5, 4.5, 4, 4, 3.5, 4, 4.5, 5, 4, 3.5, 4, 5],
                hybrid: [3, 3, 2.5, 2, 2, 2, 2.5, 3, 2.5, 2, 2.5, 2],
                petrol: [1.5, 1.2, 1, 0.8, 0.5, 0.8, 1, 1.2, 1, 0.5, 1, 1],
                diesel: [0.5, 0.3, 0.5, 0.2, 0, 0.2, 0.5, 0.8, 0.5, 0, 0.5, 0]
            },
            "Sweden": {
                labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
                bev:    [46, 47, 48, 49, 50, 49, 48, 47, 49, 50, 49, 48],
                phev:   [13, 13.5, 13, 13.5, 14, 13.5, 13, 12.5, 13, 13.5, 13, 13],
                hybrid: [24, 24.5, 25, 24, 23.5, 24, 25, 26, 25, 24, 24.5, 25],
                petrol: [12, 11, 10.5, 10, 9.5, 10, 10.5, 11, 10, 9.5, 10, 10],
                diesel: [5, 4.5, 4, 4, 3.5, 4, 4.5, 5, 4.5, 4, 4.5, 4]
            },
            "Netherlands": {
                labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
                bev:    [40, 41, 42, 43, 44, 43, 42, 41, 43, 44, 43, 42],
                phev:   [14, 14.5, 14, 14.5, 15, 14.5, 14, 13.5, 14, 14.5, 14, 14],
                hybrid: [27, 27.5, 28, 27.5, 27, 28, 28.5, 29, 28, 27.5, 28, 28],
                petrol: [14, 13, 12.5, 12, 11.5, 12, 12.5, 13, 12.5, 12, 12.5, 12],
                diesel: [5, 4.5, 4, 3.5, 3, 3.5, 4, 4.5, 4, 3.5, 4, 4]
            }
            // Hier kannst du später weitere Länder mit monatlichen Daten ergänzen
        };

        function createOrUpdateChart(canvasId, labels, datasets, chartTitle) {
            if (currentChart) {
                currentChart.destroy();
                currentChart = null;
            }

            const ctx = document.getElementById(canvasId);
            currentChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: chartTitle, font: { size: 16 } },
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true, max: 100, title: { display: true, text: 'Market Share (%)' } }
                    }
                }
            });
        }

        function showCountryChart(countryName) {
            const data = monthlyData2025[countryName];
            if (!data) {
                alert(`No monthly data available for ${countryName} yet.`);
                return;
            }

            const popupDiv = document.createElement('div');
            popupDiv.innerHTML = `
                <h3>${countryName} – Monthly New Car Registrations 2025</h3>
                <p style="text-align:center; color:#555; margin:5px 0 10px;">Market share by powertrain</p>
                <div class="chart-container">
                    <canvas id="countryChart"></canvas>
                </div>
            `;

            L.popup({ maxWidth: 820 }).setLatLng(map.getCenter()).setContent(popupDiv).openOn(map);

            setTimeout(() => {
                const datasets = [
                    { label: 'BEV (%)', borderColor: '#2c7a2c', data: data.bev, tension: 0.3, borderWidth: 3.5 },
                    { label: 'PHEV (%)', borderColor: '#4ade80', data: data.phev, tension: 0.3, borderWidth: 3.5 },
                    { label: 'Hybrid (non-plug)', borderColor: '#facc15', data: data.hybrid, tension: 0.25 },
                    { label: 'Petrol (%)', borderColor: '#ef4444', data: data.petrol },
                    { label: 'Diesel (%)', borderColor: '#64748b', data: data.diesel }
                ];
                createOrUpdateChart('countryChart', data.labels, datasets, `${countryName} – Monthly 2025`);
            }, 350);
        }

        // ==================== Karte laden ====================
        fetch('https://raw.githubusercontent.com/leakyMirror/map-of-europe/master/GeoJSON/europe.geojson')
            .then(res => res.json())
            .then(data => {
                const evData = {
                    "Norway":97, "Sweden":61, "Denmark":69, "Netherlands":56,
                    "Germany":30, "Belgium":43, "France":28, "United Kingdom":33,
                    "Italy":11, "Spain":19
                };

                data.features.forEach(f => {
                    const name = f.properties.name || f.properties.NAME;
                    if (name && evData[name] !== undefined) {
                        f.properties.ev_share = evData[name];
                    }
                });

                L.geoJSON(data, {
                    style: style,
                    onEachFeature: function(feature, layer) {
                        const name = feature.properties.name || feature.properties.NAME;
                        const ev = feature.properties.ev_share || 0;

                        layer.bindTooltip(`<strong>${name}</strong><br>EV Share: <b>${ev}%</b> (2025)`, { sticky: true });

                        layer.on('click', function() {
                            showCountryChart(name);
                        });
                    }
                }).addTo(map);
            })
            .catch(err => console.error(err));

        // Legende
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            const grades = [0, 1, 5, 15, 30, 50];
            div.innerHTML = '<strong>EV Share (%)</strong><br>';
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML += `<i style="background:${getColor(grades[i]+0.1)}; width:18px; height:18px; display:inline-block; margin-right:5px;"></i> ${grades[i]}${grades[i+1] ? '–'+grades[i+1] : '+'}%<br>`;
            }
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>

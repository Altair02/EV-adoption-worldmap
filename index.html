<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Adoption Worldmap – Europe Focus</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; }
        h1 { text-align: center; padding: 15px; background: #2c3e50; color: white; margin: 0; }
        #map { height: calc(100vh - 60px); width: 100%; }
        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-size: 14px; }
        .country-label { font-weight: bold; color: #222; text-shadow: 0 0 4px white; pointer-events: none; }
    </style>
</head>
<body>
    <h1>EV Adoption Worldmap – Europe Focus</h1>
    <div id="map"></div>

    <script src="data/countries.json"></script>

    <script>
        const map = L.map('map').setView([55, 10], 4);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
        }).addTo(map);

        function getColor(evShare) {
            if (evShare > 50) return '#006400';
            if (evShare > 30) return '#228B22';
            if (evShare > 15) return '#32CD32';
            if (evShare > 5)  return '#ADFF2F';
            if (evShare > 1)  return '#FFFF00';
            return '#FF6347';
        }

        function style(feature) {
            return { fillColor: getColor(feature.properties.ev_share || 0), weight: 2, color: '#333', fillOpacity: 0.75 };
        }

        // Ländernamen als Label auf der Karte anzeigen
        function addCountryLabels(geojsonLayer) {
            geojsonLayer.eachLayer(function(layer) {
                const name = layer.feature.properties.name;
                if (name) {
                    const center = layer.getBounds().getCenter();
                    L.marker(center, {
                        icon: L.divIcon({
                            className: 'country-label',
                            html: `<b>${name}</b>`,
                            iconSize: [80, 20],
                            iconAnchor: [40, 10]
                        })
                    }).addTo(map);
                }
            });
        }

        // Deutschland Chart (wie vorher)

        function onEachFeature(feature, layer) {
            const p = feature.properties;
            layer.bindTooltip(`<strong>${p.name}</strong><br>EV Share: <b>${p.ev_share}%</b>`, { sticky: true });

            layer.on('click', function() {
                if (p.name === "Germany") showGermanyChart();
            });

</html>

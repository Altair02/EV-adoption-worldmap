<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Car Registrations</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0e17; --surface:#111827; --border:#1e2d45; --accent:#00e5ff; --accent2:#ff6b35; --text:#e2e8f0; --muted:#64748b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0; background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px); background-size:40px 40px; }
  .container { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:24px; }
  header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; padding-bottom:20px; border-bottom:1px solid var(--border); }
  h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; letter-spacing:-0.03em; line-height:1.1; background:linear-gradient(135deg,#fff 40%,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .subtitle { color:var(--muted); font-size:0.75rem; margin-top:6px; letter-spacing:0.08em; text-transform:uppercase; }
  .main-grid { display:grid; grid-template-columns:1fr 320px; gap:20px; }
  .map-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; position:relative; }
  .map-panel svg { width:100%; height:auto; display:block; }
  .country-path { stroke:rgba(0,229,255,0.12); stroke-width:0.4px; transition:all 0.15s; cursor:pointer; }
  .country-path:hover { stroke:var(--accent); stroke-width:1px; }
  .country-path.selected { stroke:var(--accent2); stroke-width:1.5px; }
  .sidebar { display:flex; flex-direction:column; gap:16px; }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; }
  .panel-title { font-family:'Syne',sans-serif; font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  #map-loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:var(--surface); flex-direction:column; gap:12px; z-index:10; }
  .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="tooltip" style="position:fixed;background:rgba(10,14,23,0.95);border:1px solid var(--accent);border-radius:8px;padding:10px 14px;font-size:0.72rem;pointer-events:none;z-index:999;display:none;max-width:220px;backdrop-filter:blur(8px);"></div>

<div id="modal-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;">
  <div id="modal-box" style="background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:860px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 80px rgba(0,229,255,0.1);">
    <!-- Modal content wird per JS gefüllt -->
  </div>
</div>

<div class="container">
  <header>
    <div>
      <h1>Global Car<br>Registrations</h1>
      <div class="subtitle">BEV market share · Colour = % electric · Click for monthly & powertrain detail</div>
    </div>
    <select id="year-select" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-family:'DM Mono',monospace;font-size:0.75rem;">
      <option value="2024">2024</option>
      <option value="2023">2023</option>
      <option value="2022">2022</option>
    </select>
  </header>

  <div class="main-grid">
    <div class="map-panel">
      <div id="map-loading"><div class="spinner"></div><p>Loading map…</p></div>
      <svg id="map-svg" viewBox="0 0 960 500"></svg>
    </div>
    <div class="sidebar">
      <!-- Sidebar Panels (Search, Legend, Details, Top 10) – können später erweitert werden -->
      <div class="panel"><div class="panel-title">Search Country</div><input id="country-search" placeholder="e.g. Iceland, Norway..." style="width:100%;padding:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;color:var(--text);"></div>
      <div class="panel"><div class="panel-title">BEV Market Share</div><div style="height:10px;background:linear-gradient(to right,#1a2030,#00e5a0);border-radius:5px;"></div></div>
    </div>
  </div>
</div>

<script>
// === ANNUAL DATA + EV SHARE (unverändert aus deiner letzten Version) ===
const DATA = {}; // Deine bestehenden Jahresdaten hier (kannst du aus alter Datei kopieren)
const EV_SHARE = {}; // Deine bestehenden BEV-Anteile hier

// === FILE_MAP mit Iceland ===
const FILE_MAP = {
  "Austria":"austria","Belgium":"belgium","Bulgaria":"bulgaria","Cyprus":"cyprus",
  "Czech Republic":"czech_republic","Germany":"germany","Denmark":"denmark",
  "Estonia":"estonia","Greece":"greece","Spain":"spain","Finland":"finland",
  "France":"france","Croatia":"croatia","Hungary":"hungary","Ireland":"ireland",
  "Italy":"italy","Lithuania":"lithuania","Luxembourg":"luxembourg","Latvia":"latvia",
  "Malta":"malta","Netherlands":"netherlands","Poland":"poland","Portugal":"portugal",
  "Romania":"romania","Sweden":"sweden","Slovenia":"slovenia","Slovakia":"slovakia",
  "Norway":"norway","Switzerland":"switzerland","United Kingdom":"united_kingdom",
  "Iceland":"iceland"
};

let currentYear = 2024;
let selectedCountry = null;
let chartInstance = null;

// === HILFSFUNKTIONEN ===
function normName(n) { return n; }
function fmt(n) { return n ? n.toLocaleString("en-US") : "0"; }

// === MAP RENDERING ===
async function init() {
  try {
    const world = await d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json");
    const countries = topojson.feature(world, world.objects.countries);

    const svg = d3.select("#map-svg");
    const projection = d3.geoNaturalEarth1().fitSize([960, 500], countries);
    const pathGen = d3.geoPath().projection(projection);

    svg.append("path").datum({type:"Sphere"}).attr("d", pathGen).attr("fill","#0d1520");
    svg.append("path").datum(d3.geoGraticule()()).attr("d", pathGen).attr("fill","none").attr("stroke","rgba(0,229,255,0.04)").attr("stroke-width","0.3");

    svg.selectAll(".country-path")
      .data(countries.features)
      .join("path")
      .attr("class","country-path")
      .attr("d", pathGen)
      .on("click", (event, d) => {
        const name = normName(d.properties.name);
        selectByName(name);
        openModal(name);
      });

    renderMap(currentYear);
    document.getElementById("map-loading").style.display = "none";
  } catch(err) {
    document.getElementById("map-loading").innerHTML = `<p style="color:#ff6b35">Error loading map.<br><small>${err.message}</small></p>`;
  }
}

function renderMap(year) {
  // Farbskala etc. – wird in deiner vollen Version erweitert
  console.log(`Map rendered for year ${year}`);
}

function selectByName(name) {
  selectedCountry = name;
}

function openModal(name) {
  // Modal-Logik aus deiner vorherigen Version (bleibt gleich)
  console.log("Opening modal for", name);
  // Hier kommt der Rest deiner Modal-Funktion hin (Chart.js etc.)
}

// === EVENT LISTENER ===
document.getElementById("year-select").addEventListener("change", function() {
  currentYear = parseInt(this.value);
  renderMap(currentYear);
  if (selectedCountry) openModal(selectedCountry);
});

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Adoption Worldmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; }
        h1 { text-align: center; padding: 15px; background: #2c3e50; color: white; margin: 0; }
        #map { height: calc(100vh - 60px); width: 100%; }
        .legend { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); font-size: 14px; }
        .popup-chart { min-width: 700px; max-width: 900px; }
    </style>
</head>
<body>
    <h1>EV Adoption Worldmap – Europe Focus</h1>
    <div id="map"></div>

    <script src="data/countries.json"></script>

    <script>
        const map = L.map('map').setView([55, 10], 4);   // Zentriert auf Europa

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function getColor(evShare) {
            if (evShare > 50) return '#006400';
            if (evShare > 30) return '#228B22';
            if (evShare > 15) return '#32CD32';
            if (evShare > 5)  return '#ADFF2F';
            if (evShare > 1)  return '#FFFF00';
            return '#FF6347';
        }

        function style(feature) {
            return {
                fillColor: getColor(feature.properties.ev_share || 0),
                weight: 1.5,
                color: 'white',
                fillOpacity: 0.75
            };
        }

        // Deutschland Monatsdaten (2020–2025) – anteilig in %
        const germanyMonthlyData = {
            labels: [
                '2020-01','2020-06','2020-12','2021-06','2021-12','2022-06','2022-12',
                '2023-06','2023-12','2024-06','2024-12','2025-01','2025-04','2025-07','2025-10','2025-12'
            ],
            bev:   [1.8, 4.5, 6.6, 10.5, 13.5, 14.5, 17.7, 16.8, 18.4, 13.0, 13.5, 16.6, 18.8, 19.5, 19.0, 19.1],
            phev:  [2.5, 3.0, 3.0, 5.5, 6.0, 7.5, 8.5, 8.2, 9.0, 6.5, 6.8, 8.5, 10.0, 10.5, 10.7, 10.9],
            hybrid:[8, 10, 12, 15, 18.5, 20, 22, 25, 28, 32, 35, 36, 37, 38, 39, 39.5],
            petrol:[45, 40, 32, 28, 25, 24, 22, 21, 20, 30, 35.2, 28, 25, 24, 26, 27.2],
            diesel:[38, 35, 40, 32, 30, 28, 25, 22, 18, 16, 15, 14.5, 14, 13.5, 13.8, 13.8]
        };

        function showGermanyChart() {
            const popupContent = document.createElement('div');
            popupContent.className = 'popup-chart';
            popupContent.innerHTML = `
                <h3>Germany – Monthly New Car Registrations by Powertrain (2020–2025)</h3>
                <canvas id="germanyMonthlyChart" width="850" height="420"></canvas>
            `;

            L.popup({ maxWidth: 920 })
                .setLatLng([51.1657, 10.4515])   // ungefähre Mitte von Deutschland
                .setContent(popupContent)
                .openOn(map);

            // Chart erstellen, sobald Popup offen ist
            setTimeout(() => {
                const ctx = document.getElementById('germanyMonthlyChart');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: germanyMonthlyData.labels,
                        datasets: [
                            { label: 'BEV (%)', data: germanyMonthlyData.bev, borderColor: '#2c7a2c', backgroundColor: 'rgba(44,122,44,0.15)', tension: 0.3, borderWidth: 3 },
                            { label: 'PHEV (%)', data: germanyMonthlyData.phev, borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.15)', tension: 0.3, borderWidth: 3 },
                            { label: 'Hybrid non-Plug-in (%)', data: germanyMonthlyData.hybrid, borderColor: '#facc15', tension: 0.2 },
                            { label: 'Petrol (%)', data: germanyMonthlyData.petrol, borderColor: '#ef4444', tension: 0.2 },
                            { label: 'Diesel (%)', data: germanyMonthlyData.diesel, borderColor: '#64748b', tension: 0.2 }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top' },
                            tooltip: { mode: 'index', intersect: false }
                        },
                        scales: {
                            y: { beginAtZero: true, max: 100, title: { display: true, text: 'Market Share (%)' } },
                            x: { title: { display: true, text: 'Month / Year' } }
                        }
                    }
                });
            }, 400);
        }

        function onEachFeature(feature, layer) {
            const p = feature.properties;
            layer.bindTooltip(`<strong>${p.name}</strong><br>EV Share: <b>${p.ev_share || 0}%</b> (${p.year})`, { sticky: true });

            layer.on('click', function() {
                if (p.name === "Germany") {
                    showGermanyChart();
                } else {
                    // Für andere Länder einfaches Popup
                    L.popup()
                        .setLatLng(layer.getBounds().getCenter())
                        .setContent(`<h3>${p.name}</h3><p>EV Share: <strong>${p.ev_share}%</strong> (${p.bev}% BEV + ${p.phev}% PHEV)</p>`)
                        .openOn(map);
                }
            });
        }

        L.geoJSON(countriesData, {
            style: style,
            onEachFeature: onEachFeature
        }).addTo(map);

        // Legende
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            const grades = [0, 1, 5, 15, 30, 50];
            div.innerHTML = '<strong>EV Share (%)</strong><br>';
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML += `<i style="background:${getColor(grades[i] + 0.1)}; width:18px; height:18px; display:inline-block; margin-right:5px;"></i> ${grades[i]}${grades[i+1] ? '–'+grades[i+1] : '+'}%<br>`;
            }
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>

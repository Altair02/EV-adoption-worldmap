        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml pandas

      - name: Run update script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

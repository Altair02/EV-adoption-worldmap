# .github/workflows/update-data.yml
# Runs on the 1st of every month at 09:00 UTC
# Can also be triggered manually: Actions → Update Car Registration Data → Run workflow

name: Update Car Registration Data

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/update_data.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/countries/
          if git diff --cached --quiet; then
            echo "No changes – nothing to commit."
          else
            git commit -m "data: monthly update $(date +%Y-%m-%d) [ECB+Eurostat]"
            git push
            echo "Pushed ✓"
          fi

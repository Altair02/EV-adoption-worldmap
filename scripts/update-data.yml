# ── ECB monthly: nur noch STS (bis 2022) ────────────────────────
def fetch_ecb_monthly():
    STS_KEYS = [
        "M.XX.W.CREG.PC0000.3.ABS",   # funktioniert zuverlässig bis 2022-12
        "M.XX.N.CREG.PC0000.3.ABS",
    ]
    print("[ECB] Teste STS-Keys (2015–2022)…")
    sts_key = None
    for k in STS_KEYS:
        d = try_fetch("STS", k, "DE", "2020-01")
        if d:
            sts_key = k
            print(f"[ECB] ✅ STS-Key gefunden: {k}")
            break
    if not sts_key:
        print("[ECB] ❌ Kein STS-Key gefunden")
        return {}

    print(f"\n[ECB] Hole Daten für {len(COUNTRIES)} Länder…")
    results = {}
    for geo in COUNTRIES:
        merged = try_fetch("STS", sts_key, geo, "2015-01")
        if merged:
            months = sorted(merged.keys())
            results[geo] = {"labels": months, "total": [merged[m] for m in months]}
            print(f"[ECB]   {geo}: {len(months)} Monate (bis {months[-1]})")
        time.sleep(0.2)

    print(f"[ECB] Fertig – {len(results)} Länder, letzte Daten: Dezember 2022")
    return results

# fetch_eurostat_annual() bleibt 100 % gleich wie bisher (kopiere aus v10)

# write_files() mit aktualisierter Source-Note
def write_files(monthly, annual):
    DATA_DIR.mkdir(parents=True, exist_ok=True)
    changed = []
    for ecb_code, (name, estat_code, pop) in COUNTRIES.items():
        m = monthly.get(ecb_code, {})
        a = annual.get(ecb_code, {})
        if not m and not a:
            continue

        years = sorted(a.keys()) if a else []
        annual_block = { ... }  # ← bleibt gleich wie bisher

        payload = {
            "name": name,
            "ecb_code": ecb_code,
            "population_mio": pop,
            "source_monthly": "ECB Data Portal / ACEA (country-level monthly data available until Dec 2022)",
            "source_annual":  "Eurostat road_eqr_carpda",
            "last_updated":   NOW.isoformat(),
            "monthly": m,
            "annual": annual_block,
        }

        fname = name.lower().replace(" ", "_") + ".json"
        path = DATA_DIR / fname
        old = {}
        if path.exists():
            try:
                old = json.loads(path.read_text("utf-8"))
            except:
                pass

        def no_ts(d):
            d2 = dict(d)
            d2.pop("last_updated", None)
            return d2

        path.write_text(json.dumps(payload, indent=2, ensure_ascii=False), "utf-8")

        if no_ts(payload) != no_ts(old):
            changed.append(name)
            print(f"[Write] {name} ✓ (aktualisiert)")
        else:
            print(f"[Write] {name} (nur Timestamp aktualisiert)")

    return changed

